<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет интернета — KOTDEV Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 180, 216, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
        .container {
            text-align: center;
            position: relative;
            padding: 40px 20px;
        }
        .wifi-search {
            margin-bottom: 40px;
        }
        .wifi-icon-main {
    width: 64px;
    height: 64px;
    margin: 0 auto;
    animation: pulse 1.5s ease-in-out infinite;
}
.wifi-icon-main img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00b4d8;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        @keyframes dotBounce {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.3); }
        }
        .searching-text {
            color: #5a6370;
            font-size: 14px;
            margin-top: 12px;
            animation: fadeText 1.4s ease-in-out infinite;
        }
        @keyframes fadeText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .cat-image {
            width: 160px;
            height: 160px;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(0, 180, 216, 0.15);
            border: 2px solid #1e2530;
        }
        .cat-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #7c848d;
            margin-bottom: 6px;
        }
        .hint {
            font-size: 14px;
            color: #5a6370;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            background: #00b4d8;
            color: #0a0c10;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.2s;
        }
        .btn:hover {
            background: #0096b0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="wifi-search">
            <div class="wifi-icon-main">
    <img src="images/wifi-search.png" alt="Wi-Fi">
</div>
            <div class="dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <p class="searching-text">Поиск сети...</p>
        </div>

        <div class="cat-image">
            <img src="images/offline-cat.png" alt="Котик грустит">
        </div>

        <h1 class="title">Мяу? Сеть потерялась...</h1>
        <p class="hint">Попробуйте обновить страницу.</p>

        <button class="btn" onclick="location.reload()">Обновить</button>

    </div>
</body>
</html>
