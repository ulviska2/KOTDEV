<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет интернета — KOTDEV Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            padding: 40px 20px;
        }

        .cat {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
        }
        .cat-body {
            font-size: 100px;
            line-height: 1;
        }

        .tail {
            position: absolute;
            bottom: 0;
            right: -20px;
            font-size: 40px;
            transform-origin: bottom left;
            animation: tailFlick 0.8s ease-in-out infinite;
        }
        @keyframes tailFlick {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            50% { transform: rotate(15deg); }
            75% { transform: rotate(-10deg); }
        }

        .wifi-icons {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 180px;
            pointer-events: none;
        }
        .wifi-icon {
            position: absolute;
            color: rgba(0, 180, 216, 0.6);
            font-size: 28px;
            animation: floatWifi 3s ease-in-out infinite;
        }
        .wifi-icon::after {
            content: '?';
            position: absolute;
            top: -8px;
            right: -14px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: var(--accent);
        }
        .wifi-icon:nth-child(1) {
            top: 0;
            left: 10%;
            animation-delay: 0s;
        }
        .wifi-icon:nth-child(2) {
            top: 20px;
            right: 5%;
            animation-delay: 0.6s;
        }
        .wifi-icon:nth-child(3) {
            bottom: 20px;
            left: 0;
            animation-delay: 1.2s;
        }
        .wifi-icon:nth-child(4) {
            bottom: 0;
            right: 15%;
            animation-delay: 1.8s;
        }
        .wifi-icon:nth-child(5) {
            top: 40px;
            left: 40%;
            animation-delay: 2.4s;
        }

        @keyframes floatWifi {
            0%, 100% {
                transform: translateY(0) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-15px) scale(1.2);
                opacity: 1;
            }
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #7c848d;
            margin-bottom: 8px;
        }
        .hint {
            font-size: 14px;
            color: #5a6370;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-block;
            background: #00b4d8;
            color: #0a0c10;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.2s;
        }
        .btn:hover {
            background: #0096b0;
            transform: translateY(-2px);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 180, 216, 0.06) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cat">
            <div class="wifi-icons">
                <span class="wifi-icon">📶</span>
                <span class="wifi-icon">📶</span>
                <span class="wifi-icon">📶</span>
                <span class="wifi-icon">📶</span>
                <span class="wifi-icon">📶</span>
            </div>
            <div class="cat-body">🐱</div>
            <div class="tail">~</div>
        </div>
        <h1 class="title">Мяу? Сеть потерялась...</h1>
        <p class="subtitle">Котик ищет сигнал.</p>
        <p class="hint">Попробуйте обновить страницу.</p>

        <button class="btn" onclick="location.reload()">Обновить</button>
    </div>
</body>
</html>
